gui:
  # stuff relating to the UI
  screenMode: 'normal' # one of 'normal' | 'half' | 'full' default is 'normal'
  scrollHeight: 2 # how many lines you scroll by
  scrollPastBottom: true # enable scrolling past the bottom
  sidePanelWidth: 0.3333 # number from 0 to 1
  expandFocusedSidePanel: true
  mainPanelSplitMode: 'flexible' # one of 'horizontal' | 'flexible' | 'vertical'
  language: 'ja' # one of 'auto' | 'en' | 'zh' | 'pl' | 'nl' | 'ja' | 'ko' | 'ru'
  timeFormat: '02 Jan 06' # https://pkg.go.dev/time#Time.Format
  shortTimeFormat: '3:04PM'
  theme:
    activeBorderColor:
      - cyan
      - bold
    inactiveBorderColor:
      - white
    optionsTextColor:
      - blue
    selectedLineBgColor:
      - blue # set to `default` to have no background colour
    selectedRangeBgColor:
      - blue
    cherryPickedCommitBgColor:
      - cyan
    cherryPickedCommitFgColor:
      - blue
    unstagedChangesColor:
      - red
    defaultFgColor:
      - default
  commitLength:
    show: true
  mouseEvents: true
  skipDiscardChangeWarning: false
  skipStashWarning: false
  showFileTree: true # for rendering changes files in a tree format
  showListFooter: true # for seeing the '5 of 20' message in list panels
  showRandomTip: true
  showBranchCommitHash: false # show commit hashes alongside branch names
  experimentalShowBranchHeads: false # visualize branch heads with (*) in commits list
  showBottomLine: true # for hiding the bottom information line (unless it has important information to tell you)
  showCommandLog: true
  nerdFontsVersion: "3" # nerd fonts version to use ("2" or "3"); empty means don't show nerd font icons
  commandLogSize: 8
  splitDiff: 'auto' # one of 'auto' | 'always'
  skipRewordInEditorWarning: false # for skipping the confirmation before launching the reword editor
  border: 'double' # one of 'single' | 'double' | 'rounded' | 'hidden'
git:
  paging:
    colorArg: always
    pager: delta --dark --paging=never --side-by-side
  commit:
    signOff: false
    verbose: default # one of 'default' | 'always' | 'never'
  merging:
    # only applicable to unix users
    manualCommit: false
    # extra args passed to `git merge`, e.g. --no-ff
    args: ''
  log:
    # one of date-order, author-date-order, topo-order or default.
    # topo-order makes it easier to read the git log graph, but commits may not
    # appear chronologically. See https://git-scm.com/docs/git-log#_commit_ordering
    order: 'topo-order'
    # one of always, never, when-maximised
    # this determines whether the git graph is rendered in the commits panel
    showGraph: 'when-maximised'
    # displays the whole git graph by default in the commits panel (equivalent to passing the `--all` argument to `git log`)
    showWholeGraph: false
  skipHookPrefix: WIP
  # The main branches. We colour commits green if they belong to one of these branches,
  # so that you can easily see which commits are unique to your branch (coloured in yellow)
  mainBranches: [master, main]
  autoFetch: false
  autoRefresh: true
  fetchAll: false # Pass --all flag when running git fetch. Set to false to fetch only origin (or the current branch's upstream remote if there is one)
  branchLogCmd: 'git log --graph --all --color=always --date=format:"%Y-%m-%d %H:%M" --pretty=format:"%C(#a0a0a0 reverse)%h%Creset %C(cyan)%ad%Creset %C(#ee7800)%ae%Creset %C(yellow reverse)%d%Creset %n%C(white bold)%s%Creset%n" {{branchName}}'
  overrideGpg: false # prevents lazygit from spawning a separate process when using GPG
  disableForcePushing: false
  parseEmoji: false
  diffContextSize: 3 # how many lines of context are shown around a change in diffs
  allBranchesLogCmds:
    - git log --graph --all --color=always --date=format:"%Y-%m-%d %H:%M" --pretty=format:"%C(#a0a0a0 reverse)%h%Creset %C(cyan)%ad%Creset %C(#ee7800)%ae%Creset %C(yellow reverse)%d%Creset %n%C(white bold)%s%Creset%n" {{branchName}}
os:
  editPreset: 'nvim-remote'
  edit: "nvim --server /tmp/$(basename $PWD).pipe --remote-tab {{filename}}"
  editInTerminal: true
customCommands:
  - key: 'w'
    context: 'localBranches'
    description: 'worktreeを作成しwezterm workspaceを作る'
    command: >-
      bash -lc '
        BRANCH="{{.SelectedLocalBranch.Name}}"
        CURRENT=$(git symbolic-ref --short HEAD 2>/dev/null)
        if [ "$CURRENT" = "$BRANCH" ]; then
          echo "Error: Cannot create worktree for currently checked out branch: $BRANCH"
          exit 1
        fi
        PATH_NAME="${BRANCH//\//-}"
        REPO_ROOT=$(git rev-parse --show-toplevel)
        WORKTREE_PATH="$(dirname "$REPO_ROOT")/$PATH_NAME"
        git worktree add "$WORKTREE_PATH" "$BRANCH"
        wezterm cli spawn --new-window --workspace "$PATH_NAME" --cwd "$WORKTREE_PATH"
      '
    output: log
  - key: 'w'
    context: 'remoteBranches'
    description: 'checkoutして、worktreeを作成しwezterm workspaceを作る'
    command: >-
      bash -lc '
        REMOTE_BRANCH="{{.SelectedRemoteBranch.Name}}"
        LOCAL_BRANCH="${REMOTE_BRANCH#*/}"
        PATH_NAME="${LOCAL_BRANCH//\//-}"
        REPO_ROOT=$(git rev-parse --show-toplevel)
        WORKTREE_PATH="$(dirname "$REPO_ROOT")/$PATH_NAME"
        git fetch origin "$LOCAL_BRANCH" || true
        git worktree add "$WORKTREE_PATH" "$LOCAL_BRANCH" 2>/dev/null || \
          git worktree add -b "$LOCAL_BRANCH" "$WORKTREE_PATH" "origin/$LOCAL_BRANCH"
        wezterm cli spawn --new-window --workspace "$PATH_NAME" --cwd "$WORKTREE_PATH"
      '
    output: log
  - key: 'W'
    context: 'localBranches'
    description: 'ブランチを作成して、worktreeを作成しwezterm workspaceを作る'
    prompts:
      - type: 'input'
        title: 'New branch name'
        key: 'NewBranch'
      - type: 'input'
        title: 'Base branch'
        key: 'BaseBranch'
        initialValue: 'main'
    command: >-
      bash -lc '
        NEW_BRANCH="{{.Form.NewBranch}}"
        BASE_BRANCH="{{.Form.BaseBranch}}"
        PATH_NAME="${NEW_BRANCH//\//-}"
        REPO_ROOT=$(git rev-parse --show-toplevel)
        WORKTREE_PATH="$(dirname "$REPO_ROOT")/$PATH_NAME"
        git worktree add -b "$NEW_BRANCH" "$WORKTREE_PATH" "$BASE_BRANCH"
        wezterm cli spawn --new-window --workspace "$PATH_NAME" --cwd "$WORKTREE_PATH"
      '
    output: log
